dev_setup:
	- "Ative o ambiente virtual: & ./venv/Scripts/Activate.ps1"
	- "Execute scripts Python usando: ./venv/Scripts/python.exe <script.py>"
schema: spec-driven


context: |
	Tech stack: Python 3.x
	Modularização por domínio: capture, encoder, recorder, transport, ui, utils, client, test
	Utilização de virtualenv para dependências Python
	Documentação e rastreabilidade via OpenSpec
	Ponto de entrada: main.py
	Principais módulos:
		- capture/screen.py: captura de tela
		- encoder/frame_encoder.py: codificação de frames
		- recorder/ffmpeg_recorder.py: gravação com FFmpeg
		- recorder/video_writer.py: escrita de vídeo
		- ui/app.py: interface de usuário
		- test/: scripts e testes automatizados
		- openspec/: specs, mudanças e configuração
	Pastas client, transport e utils reservadas para expansão
	Diagrama simplificado disponível em openspec/specs/architecture.md

rules:
	proposal:
		- Propostas devem ser concisas e objetivas
		- Sempre incluir contexto e motivação
		- Referenciar módulos e arquivos conforme architecture.md
	tasks:
		- Quebrar tarefas em etapas de até 2 horas
		- Relacionar tarefas a módulos específicos
		- Documentar mudanças em openspec/changes/
	specs:
		- Especificações de arquitetura devem ser mantidas em openspec/specs/
		- Atualizar o diagrama e contexto sempre que houver mudanças estruturais
